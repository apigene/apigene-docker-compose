# Apigene gateway — routes all traffic through a single entry point.
# Host port APIGENE_PORT maps to container port 8080 (see docker-compose.yml).
#
# Copilot shares this container's network and calls http://localhost:$APIGENE_PORT
# for server-side API requests. Nginx must listen on that same port inside the
# container (8080 below). If you change APIGENE_PORT in .env, update BOTH:
#   1. listen 8080;  → your new port number
#   2. docker-compose.yml ports mapping → ${APIGENE_PORT}:<same port>

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr;

    server {
        listen 80;
        listen 8080;  # must match APIGENE_PORT — change both when using a different port
        client_max_body_size 15M;

        location @json_502 {
            default_type application/json;
            return 502 '{"error":"Bad Gateway","message":"NGINX: upstream unavailable","status_code":502}';
        }
        location @json_504 {
            default_type application/json;
            return 504 '{"error":"Gateway Timeout","message":"NGINX: upstream timeout","status_code":504}';
        }

        location = /nginx-health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"nginx"}';
        }

        location = /api/health {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 2s;
            proxy_read_timeout 2s;
        }

        location ~ ^/api/mcp/(.*)$ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_intercept_errors on;
            error_page 502 = @json_502;
            error_page 504 = @json_504;
        }

        location ~ ^/api/(.*)$ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 502 = @json_502;
            error_page 504 = @json_504;
        }

        location ~ ^/(docs|openapi.json|redoc) {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/([^/]+)/([^/]+)/mcp/?$ {
            proxy_pass http://mcp-gw:8001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
        }

        location /mcp_gw_oauth_callback {
            proxy_pass http://mcp-gw:8001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/\.well-known/(.*)$ {
            proxy_pass http://mcp-gw:8001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            # Copilot shares this container's network (network_mode: service:nginx).
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }
}
